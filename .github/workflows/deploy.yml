name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main  # Triggers the deployment every time you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git runner environment
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Force push the main branch to your Hugging Face Space Git remote
          git push --force https://XxxRayanxxx:$HF_TOKEN@huggingface.co/spaces/XxxRayanxxx/Discord-arabic main
